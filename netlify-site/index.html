<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Johns Passion Fruit Express</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f1ffe8;color:#003b1f}
.hero{background:linear-gradient(135deg,#006b35,#3caf68);color:white;text-align:center;padding:110px 20px}
.hero h1{font-size:48px}
.hero p{font-size:18px}
.btn{background:#ffd800;color:#111;padding:12px 20px;border-radius:30px;text-decoration:none;font-weight:bold}
section{padding:40px 5%}
#gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.plant{background:white;border-radius:15px;padding:15px;box-shadow:0 4px 10px #0002}
.plant img{width:100%;border-radius:10px}
.empty{background:white;padding:25px;border-radius:12px;text-align:center}
</style>
</head>

<body>

<div class="hero">
  <h1>Johns Passion Fruit Express</h1>
  <p>Greenhouse Grown • Chemical Free • Island Love</p>
</div>

<section>
  <h2>Available For Sale Plants</h2>
  <div id="gallery"></div>
</section>

<script>
async function loadGallery(){
  const gallery = document.getElementById("gallery");

  try {
    const res = await fetch("/.netlify/functions/list-listings");
    const listings = await res.json();

    if(!listings.length){
      gallery.innerHTML = `<div class="empty">No plants yet. Upload from your phone app.</div>`;
      return;
    }

    gallery.innerHTML = listings.map(item => `
      <div class="plant">
        <img src="${item.image}">
        <h3>${item.title}</h3>
        <p><strong>$${item.price}</strong></p>
        <p>${item.description}</p>
      </div>
    `).join("");

  } catch(e) {
    gallery.innerHTML = `<div class="empty">Loading failed (functions not live yet)</div>`;
  }
}
loadGallery();
</script>

</body>
</html>
