<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Johns Passion Fruit Express - Listings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4fff4;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #2e7d32;
    }

    .upload-box {
      margin: 20px auto;
      padding: 20px;
      border: 2px dashed #4caf50;
      width: 300px;
      border-radius: 10px;
      background: #ffffff;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .listing {
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    img {
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🌿 Johns Passion Fruit Express</h1>
<p>Create a listing instantly</p>

<div class="upload-box">
  <input type="file" id="imageInput">
  <br>
  <button onclick="handleUpload()">Generate Listing</button>
</div>

<div id="result"></div>

<script>
async function uploadToCloudinary(file) {
  const cloudName = "dqdlmbj0q";
  const uploadPreset = "johns_passion_upload";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const response = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  if (!response.ok) {
    throw new Error("Upload failed");
  }

  const data = await response.json();
  return data.secure_url;
}

async function handleUpload() {
  const fileInput = document.getElementById("imageInput");
  const result = document.getElementById("result");

  if (!fileInput.files.length) {
    alert("Select an image first");
    return;
  }

  result.innerHTML = "Uploading...";

  try {
    const imageUrl = await uploadToCloudinary(fileInput.files[0]);

    const listing = `
      <div class="listing">
        <h2>Passion Fruit Plant - $25</h2>
        <img src="${imageUrl}" width="250"/>
        <p>
          ✔️ 1ft+ Guaranteed<br>
          ✔️ Greenhouse Grown<br>
          ✔️ Chemical Free<br>
          ✔️ Strong healthy roots<br><br>
          Message now to purchase 🌿
        </p>
      </div>
    `;

    result.innerHTML = listing;

  } catch (err) {
    result.innerHTML = "Upload failed ❌";
    console.error(err);
  }
}
</script>
<hr style="margin:50px 0;">

</body>
</html>
